version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: volunteer-db-dev
    environment:
      POSTGRES_DB: volunteer_db_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - volunteer-dev-network

  redis:
    image: redis:7-alpine
    container_name: volunteer-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - volunteer-dev-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volunteer-backend-dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/volunteer_db_dev
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8080
      API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - database
      - redis
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    networks:
      - volunteer-dev-network
    restart: unless-stopped
    command: mvn spring-boot:run

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: volunteer-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - volunteer-dev-network
    restart: unless-stopped
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: volunteer-nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - volunteer-dev-network
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  volunteer-dev-network:
    driver: bridge