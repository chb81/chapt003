version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: volunteer-db
    environment:
      POSTGRES_DB: volunteer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - volunteer-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: volunteer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - volunteer-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volunteer-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/volunteer_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8080
      API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "8080:8080"
    depends_on:
      - database
      - redis
    networks:
      - volunteer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: volunteer-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - volunteer-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: volunteer-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - volunteer-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  volunteer-network:
    driver: bridge