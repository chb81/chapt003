spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-jwt-token-generation-and-validation
  expiration: 86400000

aliyun:
  sms:
    access-key-id: test-access-key-id
    access-key-secret: test-access-key-secret
    sign-name: test-sign-name
    template-code: test-template-code

logging:
  level:
    com.chapt003: DEBUG
