spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  mail:
    host: smtp.test.com
    port: 587
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-jwt-token-generation-and-validation
  expiration: 86400000

aliyun:
  sms:
    access-key-id: test-access-key-id
    access-key-secret: test-access-key-secret
    sign-name: test-sign-name
    template-code: test-template-code

logging:
  level:
    com.chapt003: DEBUG
